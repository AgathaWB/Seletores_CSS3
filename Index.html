<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Abrigo de Animais - Exercício de Seletores</title>
    <link rel="stylesheet" href="seletores.css">
    <style>
        body {
            background-color: #4988C4; /*okay*/
            font-family: Arial, sans-serif;/*okay*/
        }

        #topo-principal {
            background-color: #1C4D8D;/*okay*/
            color: #1C4D8D;/*okay*/
            padding: 20px;/*okay*/
        }

        .card {
            background-color: #BDE8F5;/*okay*/
            border-radius: 10px;/*okay*/
            width: 200px;/*okay*/
            /*Não coloquei*/
            padding: 15px;
            margin: 10px;
            display: inline-block;
        }

        p span {
            font-weight: bold;/*okay*/
            color: blue;/*okay*/
        }

        h1, h2 {
            color: #000000;/*okay*/
        }

        .card.destaque {
            border: 3px solid #1C4D8D;/*okay*/
            transform: scale(1.05);/*okay*/
        }

        button:hover {
            background-color: #4988C4;/*okay*/
            cursor: pointer;/*okay*/
            /*não coloquei*/
            color: #BDE8F5;
            
        }

        nav ul li:nth-child(2) {
            text-transform: uppercase;/*okay*/
        }

    </style>
</head>

<body>

    <header id="topo-principal">
        <h1>Amigo Pet</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Adotar</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="lista-animais">
            <article class="card">
                <h2>Rex</h2>
                <p>Raça: <span>Labrador</span></p>
                <button>Quero Adotar</button>
            </article>

            <article class="card destaque">
                <h2>Luna</h2>
                <p>Raça: <span>Vira-lata</span></p>
                <button>Quero Adotar</button>
            </article>

            <article class="card">
                <h2>Miau</h2>
                <p>Raça: <span>Siamês</span></p>
                <button>Quero Adotar</button>
            </article>
        </section>
    </main>

</body>

</html>
